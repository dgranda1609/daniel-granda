<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daniel Rodrigo | Audiovisual Creator & AI Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Space+Grotesk:wght@300;400;500;700&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              primary: '#FFFDDB',
              accent: '#FF3831',
              bg: '#140c0c',
              secondary: '#3F3F46',
              text: '#FFFDDB',
            }
          },
          fontFamily: {
            heading: ['Archivo', 'sans-serif'],
            serif: ['Fraunces', 'serif'],
            body: ['Space Grotesk', 'sans-serif'],
          },
          spacing: {
            '8': '8px',
            '16': '16px',
            '24': '24px',
            '32': '32px',
            '64': '64px',
            '128': '128px',
          },
          animation: {
            'border-beam': 'border-beam 3s linear infinite',
            'ticker': 'ticker 200s linear infinite',
          },
          keyframes: {
            'border-beam': {
              '0%': { 'background-position': '0% 50%' },
              '100%': { 'background-position': '200% 50%' },
            },
            'ticker': {
              '0%': { transform: 'translateX(0)' },
              '100%': { transform: 'translateX(-100%)' }
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #140c0c;
      color: #FFFDDB;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: all 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }

    .glass {
      backdrop-filter: blur(10px) saturate(180%);
      background: rgba(15, 15, 15, 0.7);
      border-bottom: 1px solid rgba(255, 253, 219, 0.05);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #140c0c;
    }

    ::-webkit-scrollbar-thumb {
      background: #3F3F46;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #FF3831;
    }

    .film-grain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      mask-image: radial-gradient(circle at center, transparent 30%, black 100%);
      -webkit-mask-image: radial-gradient(circle at center, transparent 30%, black 100%);
    }

    .film-grain::before {
      content: "";
      position: absolute;
      top: -100%;
      left: -100%;
      width: 300%;
      height: 300%;
      opacity: 0.08;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.5' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      animation: grain 8s steps(10) infinite;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
