<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daniel Granda | Audiovisual Creator & AI Builder</title>
  <link rel="icon" type="image/png" href="/sphere-logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Space+Grotesk:wght@300;400;500;700&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              primary: 'var(--color-primary)',
              accent: '#FF3831',
              bg: 'var(--color-bg)',
              secondary: 'var(--color-secondary)',
              text: 'var(--color-primary)',
            }
          },
          fontFamily: {
            heading: ['Archivo', 'sans-serif'],
            serif: ['Fraunces', 'serif'],
            body: ['Space Grotesk', 'sans-serif'],
          },
          spacing: {
            '8': '8px',
            '16': '16px',
            '24': '24px',
            '32': '32px',
            '64': '64px',
            '128': '128px',
          },
          animation: {
            'border-beam': 'border-beam 3s linear infinite',
            'ticker': 'ticker 200s linear infinite',
          },
          keyframes: {
            'border-beam': {
              '0%': { 'background-position': '0% 50%' },
              '100%': { 'background-position': '200% 50%' },
            },
            'ticker': {
              '0%': { transform: 'translateX(0)' },
              '100%': { transform: 'translateX(-100%)' }
            }
          }
        }
      }
    }
  </script>
  <style>
    /* ─── Theme Variables ─────────────────────────────────────── */
    :root {
      --color-primary: #FFFDDB;
      --color-bg: #140c0c;
      --color-secondary: #3F3F46;
      --color-surface: #0F0F0F;
      --color-glass-bg: rgba(15, 15, 15, 0.7);
      --color-glass-border: rgba(255, 253, 219, 0.05);
      --color-navbar-bg: rgba(15, 15, 15, var(--nav-alpha, 0));
      --color-modal-bg: rgba(20, 12, 12, 0.85);
      --grain-opacity: 0.08;
    }

    :root.light {
      --color-primary: #1A1A1A;
      --color-bg: #F5F3EE;
      --color-secondary: #A0A0A0;
      --color-surface: #EAE8E3;
      --color-glass-bg: rgba(245, 243, 238, 0.8);
      --color-glass-border: rgba(26, 26, 26, 0.08);
      --color-navbar-bg: rgba(245, 243, 238, var(--nav-alpha, 0));
      --color-modal-bg: rgba(245, 243, 238, 0.92);
      --grain-opacity: 0.04;
    }

    body {
      background-color: var(--color-bg);
      color: var(--color-primary);
      -webkit-font-smoothing: antialiased;
      transition: background-color 400ms ease, color 400ms ease;
    }

    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: all 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }

    .perspective-container {
      perspective: 1000px;
    }

    .preserve-3d {
      transform-style: preserve-3d;
    }

    .glass {
      backdrop-filter: blur(10px) saturate(180%);
      background: var(--color-glass-bg);
      border-bottom: 1px solid var(--color-glass-border);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--color-bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--color-secondary);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #FF3831;
    }

    .film-grain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      mask-image: radial-gradient(circle at center, transparent 30%, black 100%);
      -webkit-mask-image: radial-gradient(circle at center, transparent 30%, black 100%);
    }

    .film-grain::before {
      content: "";
      position: absolute;
      top: -100%;
      left: -100%;
      width: 300%;
      height: 300%;
      opacity: var(--grain-opacity);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.5' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      animation: grain 8s steps(10) infinite;
    }

    /* ─── Mobile Base ──────────────────────────────────────────── */
    /* clip instead of hidden: prevents horizontal scroll without creating a new
       scroll container, which would break position:sticky on all sections */
    html, body {
      overflow-x: clip;
    }

    /* ─── Stat Bubbles: labels always visible on mobile ──────── */
    @media (max-width: 767px) {
      .stat-bubble-label {
        opacity: 1 !important;
      }
    }

    /* ─── Services: show content on touch (tap-toggled via JS) ── */
    /* Touch-friendly tap target minimum */
    @media (max-width: 767px) {
      .service-item {
        min-height: 56px;
        cursor: pointer;
      }
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
